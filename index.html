<!DOCTYPE html>
<html>
<head>
  <title>SkillMap AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css"> <!-- NEW -->
</head>

<body>

<div class="container fade-in">

  <h1 class="slide-up">🔷 SkillMap AI</h1>
  <p class="slide-up">From Resume to Roadmap 🚀</p>

  <label>Select Role:</label>
  <select id="role" class="slide-up">
    <option>Data Scientist</option>
    <option>Web Developer</option>
  </select>

  <label>Enter Your Skills:</label>
  <input type="text" id="skills" placeholder="Python, SQL" class="slide-up">

  <button class="pulse glow" onclick="analyze()">Analyze</button>
  <button class="pulse" onclick="startQuiz()">Take Quick Quiz 🎯</button>

  <div id="result" class="fade-in"></div>

</div>

<script src="script.js"></script>

</body>
</html>
