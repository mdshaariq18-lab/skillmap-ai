<!DOCTYPE html>
<html>
<head>
  <title>SkillMap AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🔷 SkillMap AI</h1>
  <p>From Resume to Roadmap 🚀</p>

  <label>Select Role:</label>
  <select id="role">
    <option>Data Scientist</option>
    <option>Web Developer</option>
  </select>

  <label>Enter Your Skills:</label>
  <input type="text" id="skills" placeholder="Python, SQL">

  <button onclick="analyze()">Analyze</button>
  <button onclick="startQuiz()">Take Quick Quiz 🎯</button>

  <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
